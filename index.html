<html lang="pt-BR">
<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d0d1a;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: white;
      border-radius: 50%;
      animation: twinkle var(--dur) infinite ease-in-out;
      opacity: 0;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0; }
      50% { opacity: var(--op); }
    }

    .card {
      text-align: center;
      padding: 3rem 4rem;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      backdrop-filter: blur(12px);
      box-shadow: 0 0 60px rgba(130, 80, 255, 0.2);
      animation: fadeIn 0.8s ease forwards;
      max-width: 480px;
      width: 90%;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .icon {
      font-size: 3.5rem;
      margin-bottom: 1rem;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.12); }
    }

    h1 {
      color: #fff;
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      letter-spacing: 0.02em;
    }

    p {
      color: rgba(255,255,255,0.55);
      font-size: 0.95rem;
      margin-bottom: 2rem;
    }

    .progress-bar {
      width: 100%;
      height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 99px;
      overflow: hidden;
      margin-bottom: 1.5rem;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      border-radius: 99px;
      background: linear-gradient(90deg, #7c3aed, #a855f7, #ec4899);
      animation: fill 3s linear forwards;
    }

    @keyframes fill {
      from { width: 0%; }
      to   { width: 100%; }
    }

    .btn {
      display: inline-block;
      padding: 0.75rem 2rem;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(124, 58, 237, 0.4);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 28px rgba(124, 58, 237, 0.6);
    }

    .countdown {
      margin-top: 1rem;
      color: rgba(255,255,255,0.35);
      font-size: 0.82rem;
    }

    #count {
      color: #a855f7;
      font-weight: 700;
    }
  </style>
</head>
<body>

  <div class="stars" id="stars"></div>

  <div class="card">
    <div class="icon">🔮</div>
    <h1>Mistika Quiz</h1>
    <p>Você está sendo redirecionado para o quiz misterioso…</p>
    <div class="progress-bar">
      <div class="progress-fill"></div>
    </div>
    <a class="btn" href="https://quizv2-two.vercel.app/">Ir agora →</a>
    <p class="countdown">Redirecionamento automático em <span id="count">3</span>s</p>
  </div>

  <script>
    // Generate stars
    const container = document.getElementById('stars');
    for (let i = 0; i < 120; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      s.style.cssText = `
        left: ${Math.random() * 100}%;
        top: ${Math.random() * 100}%;
        --dur: ${2 + Math.random() * 4}s;
        --op: ${0.3 + Math.random() * 0.7};
        animation-delay: ${Math.random() * 4}s;
        width: ${1 + Math.random() * 2}px;
        height: ${1 + Math.random() * 2}px;
      `;
      container.appendChild(s);
    }

    window.location.href = 'https://quizv2-two.vercel.app/';
  </script>
</body>
</html>
